services:
  postgres:
    image: postgres:16-alpine
    container_name: hpd_booking_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hpd_booking
    ports:
      - '5432:5432'
    volumes:
      - hpd_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d hpd_booking']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  hpd_pgdata:
